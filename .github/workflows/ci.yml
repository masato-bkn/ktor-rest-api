name: CI

# push・PR のいずれかをトリガーにする。
# branches: ["**"] で全ブランチが対象（特定ブランチだけにしたい場合はここを絞る）。
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK をセットアップ。
      # distribution: temurin = Eclipse Foundation 提供の OpenJDK ビルド（旧 AdoptOpenJDK の後継）。
      # 無料・オープンソースで CI での利用実績が多く定番の選択肢。
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # Gradle のダウンロード済みファイルをキャッシュして実行時間を短縮する。
      #   ~/.gradle/caches   : 依存ライブラリの jar ファイル等
      #   ~/.gradle/wrapper  : Gradle 本体のバイナリ
      # key は *.gradle.kts と gradle-wrapper.properties のハッシュ値で構成し、
      # これらのファイルに変更がなければ前回のキャッシュをそのまま再利用する。
      # restore-keys はプレフィックスマッチのフォールバック。
      # key が完全一致しない場合（依存関係が変わった等）でも
      # 同プレフィックスの最新キャッシュを部分的に再利用してダウンロード量を削減する。
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ktlint でコードスタイルをチェックする。
      # 違反があると exit code 非0 でジョブが失敗する。
      # 自動修正したい場合は ktlintFormat タスクをローカルで実行する。
      - name: Run ktlint
        run: ./gradlew ktlintCheck
